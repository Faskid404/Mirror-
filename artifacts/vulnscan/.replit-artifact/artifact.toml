kind = "web"
previewPath = "/"
title = "VulnScan Pro"
version = "1.0.0"
id = "artifacts/vulnscan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25957

[services.development]
run = "pnpm --filter @workspace/vulnscan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vulnscan", "run", "build" ]
publicDir = "artifacts/vulnscan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25957"
BASE_PATH = "/"
